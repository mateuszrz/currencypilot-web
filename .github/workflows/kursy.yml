name: Odswiez kursy

# Dwa zrodla, dwie pory publikacji:
#   NBP  tabela A  ~12:15 czasu polskiego  -> przebiegi 11:00 i 13:00 UTC
#   EBC  kursy ref. ~16:00 CET             -> przebiegi 14:30 i 15:30 UTC
# Cron chodzi w UTC, a Polska zmienia czas dwa razy w roku, wiec kazde zrodlo
# lapiemy dwa razy (zima CET / lato CEST). Za kazdym przebiegiem odswiezamy
# oba zrodla — gdy dane sie nie zmienily, nie ma czego commitowac.
on:
  schedule:
    - cron: "0 11 * * 1-5"
    - cron: "0 13 * * 1-5"
    - cron: "30 14 * * 1-5"
    - cron: "30 15 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: kursy
  cancel-in-progress: false

jobs:
  odswiez:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Wygeneruj polskie strony kursow (NBP)
        run: python tools/generate_currency_pages.py

      # Po polskim, bo scala swoje adresy do sitemap.xml zapisanego wyzej.
      - name: Wygeneruj angielskie strony kursow (EBC)
        run: python tools/generate_en_pages.py

      - name: Zacommituj, jesli kursy sie zmienily
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "Tabela bez zmian — nie ma czego publikowac."
            exit 0
          fi

          TABELA=$(grep -oP 'tabela \K[0-9]+/A/NBP/[0-9]+' kursy-walut/index.html | head -1)
          git add -A
          git commit -m "Kursy: tabela ${TABELA}"
          git push
